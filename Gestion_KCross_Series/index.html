ables-btn data-i18n=indexPage.createTablebtn></button><div id=setup-message></div></div></div></div><div id=create-manual-modal class=dialog-overlay style="display: none;"><div class=dialog-box><div class=modal-header><h2 id=dialog-title data-i18n=indexPage.importModalTitle></h2></div><form id=create-manual-form><div class=modal-content><fieldset><legend data-i18n=indexPage.detailsLegend></legend><div class=config-group><div class=form-row><div class=form-col><label for=comp-nom data-i18n=indexPage.labelCompName></label><input type=text id=comp-nom required data-i18n-placeholder=indexPage.placeholderCompName></div><div class=form-col><label for=comp-ville data-i18n=indexPage.labelCity></label><input type=text id=comp-ville required data-i18n-placeholder=indexPage.placeholderCity></div></div><div class=form-row><div class=form-col><label for=comp-date-debut data-i18n=indexPage.labelStartDate></label><input type=date id=comp-date-debut required></div><div class=form-col><label for=comp-date-fin data-i18n=indexPage.labelEndDate></label><input type=date id=comp-date-fin required></div></div></div></fieldset><fieldset id=csv-mapping-area style="display: none;"><legend data-i18n=indexPage.mappingLegend></legend><p style="color: var(--color-text-muted); font-size: 0.9rem; margin-bottom: var(--spacing-md);" data-i18n=indexPage.mappingHelperText></p><div id=csv-column-mappers></div><div id=csv-preview-table></div></fieldset><fieldset><legend data-i18n=indexPage.fileLegend></legend><div class=config-group><label data-i18n=indexPage.labelSelectFile></label><div class=custom-file-upload><input type=file id=csv-file-input class=hidden-file-input accept=.csv required><label for=csv-file-input class=btn-upload data-i18n=indexPage.btnBrowse></label><span id=csv-file-name class=file-name-display data-i18n=indexPage.noFileSelected></span></div><small style="color: var(--color-text-muted); font-size: 0.85rem;" data-i18n=indexPage.fileHelperText></small></div></fieldset></div><div clas
