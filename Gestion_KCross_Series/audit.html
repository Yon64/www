<!DOCTYPE html><html lang=fr><head><meta charset=UTF-8><meta name=viewport content="width=device-width, initial-scale=1.0"><title>Journal d'audit</title><link rel=icon type=image/png sizes=64x64 href=./favicons/favicon-64x64.png><link href=./css/audit.css rel=stylesheet><link href=./css/materiel-icons.css rel=stylesheet></head><body><div class=container><header class=header><div class=header-titles><h1>Journal d'audit</h1><p>Historique des opérations en base de données</p><p id=competition-filter-info class=filter-info style=display:none;></p></div><div class=header-placeholder></div></header><div class=content><div class=controls-bar><div class=control-group><span class=control-label>Enregistrement <br>des logs :</span><label class=switch-container><input type=checkbox id=audit-active-toggle><span class=switch-slider></span></label></div><div class=control-group><label for=limit-select>Afficher :</label><select id=limit-select><option value=10>10 derniers</option><option value=20 selected>20 derniers</option><option value=50>50 derniers</option><option value=100>100 derniers</option><option value=200>200 derniers</option></select></div><div id=refresh-controls class="control-group inline-group"><label class=checkbox-label><input type=checkbox id=auto-refresh-toggle> Rafraîchissement auto </label><select id=refresh-interval disabled><option value=5000>5s</option><option value=10000 selected>10s</option><option value=30000>30s</option></select><button id=refresh-btn class=btn-icon title="Rafraîchir maintenant"><span class=material-icons>refresh</span></button></div><span id=last-update class=last-update></span><div class="control-group control-group-right"><button id=backup-db-btn class="btn-action btn-backup" title="Sauvegarde de la base KCross"><span class=material-icons>save</span><span id=backup-btn-text>Backup Base</span></button><button id=clear-logs-btn class="btn-action btn-danger" title="Supprimer les logs"><span class=material-icons>delete_forever</span><span id=clear-btn-text>Effacer les logs</span></button></div></div><div class=logs-table-container><table id=logs-table class=logs-table><thead><tr><th class=col-time>Date/Heure</th><th class=col-action>Action</th><th class=col-competition>Compétition</th><th class=col-tables>Tables</th><th class=col-records>Enreg.</th><th class=col-user>Utilisateur</th><th class=col-status>Statut</th><th class=col-details>Détails</th></tr></thead><tbody id=logs-tbody></tbody></table></div><div id=pagination-bar class=pagination-bar style=display:none;><div class=pagination-info><span id=pagination-summary></span></div><div class=pagination-controls><button id=page-first class=btn-page title="Première page"><span class=material-icons>first_page</span></button><button id=page-prev class=btn-page title="Page précédente"><span class=material-icons>chevron_left</span></button><div id=page-numbers class=page-numbers></div><button id=page-next class=btn-page title="Page suivante"><span class=material-icons>chevron_right</span></button><button id=page-last class=btn-page title="Dernière page"><span class=material-icons>last_page</span></button></div></div><div id=no-logs class=info-panel style=display:none;><span class=material-icons>info</span><p>Aucun log d'audit disponible.</p></div><div id=error-panel class=error-panel style=display:none;><span class=material-icons>error</span><p id=error-message></p></div><div id=loading class=loading style=display:none;><span class="material-icons spinning">sync</span><span>Chargement...</span></div></div></div><div id=details-modal class=modal-overlay style=display:none;><div class=modal-box><div class=modal-header><button id=prev-log-btn class=btn-nav title="Log précédent"><span class=material-icons>chevron_left</span></button><h2>Détails du log <span id=log-position></span></h2><div class=modal-header-right><button id=next-log-btn class=btn-nav title="Log suivant"><span class=material-icons>chevron_right</span></button><button id=close-modal class=btn-close><span class=material-icons>close</span></button></div></div><div class=modal-content id=modal-content></div></div></div><div id=custom-dialog-overlay class=dialog-overlay style=display:none;><div class=dialog-box><h2 id=dialog-title></h2><p id=dialog-message></p><div id=dialog-actions class=dialog-actions></div></div></div><script type=module src=./js/audit.js></script><style>.filter-info{margin-top:5px;font-size:0.85em;color:#fff;background:rgba(255,255,255,0.2);padding:4px 10px;border-radius:4px;display:inline-block}.filter-info .code{font-family:monospace;font-weight:bold}</style></body></html>
