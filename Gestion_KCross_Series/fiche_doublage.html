<!DOCTYPE html><html lang=fr><head><meta charset=UTF-8><meta name=viewport content="width=device-width, initial-scale=1.0"><title>Feuille de Jugement Kayak Cross</title><style>@page{size:A4 landscape;margin:10mm}body{font-family:Arial,sans-serif;margin:0;padding:10px}.page:not(:last-child){page-break-after:always}.header{text-align:center;margin-bottom:15px;padding-bottom:10px;border-bottom:2px solid #000}.bandeau{font-size:20px;font-weight:bold;margin-bottom:10px}.poste-section{font-size:14px;margin-bottom:5px}.poste-section span{margin-right:15px}.porte-input{display:inline-block;margin-left:10px}.porte-input input{width:60px;height:25px;font-size:14px;text-align:center;border:1px solid #000}.bloc{margin-bottom:15px;border:2px solid #000;padding:8px}table{width:100%;border-collapse:collapse}th,td{border:1px solid #000;text-align:center;height:35px;font-size:12px}th{background-color:#e0e0e0;font-weight:bold}.row-label{width:35px;font-weight:bold;font-size:16px;padding:5px}.row-label.red{background-color:#ff0000;color:white}.row-label.green{background-color:#00b300;color:white}.row-label.blue{background-color:#0000ff;color:white}.row-label.yellow{background-color:#ffff00;color:black}.serie-number{display:inline-block;width:28px;height:28px;border:2px solid #0066cc;border-radius:50%;text-align:center;line-height:28px;font-weight:bold;color:#0066cc;font-size:13px}.serie-number.hidden-number{visibility:hidden}.aide-remplissage{margin-top:15px;margin-bottom:20px;text-align:center;padding:10px;border:2px solid #000;background-color:#f5f5f5}.aide-title{font-weight:bold;font-size:14px;margin-bottom:8px}.aide-content{display:flex;justify-content:center;align-items:center;flex-wrap:wrap;gap:15px;font-size:13px}.aide-section{white-space:nowrap}.aide-separator{font-weight:bold;color:#666}.aide-item{display:inline-flex;align-items:center;gap:5px;white-space:nowrap}.exemple-case{display:inline-block;width:25px;height:25px;border:1px solid #000;text-align:center;line-height:25px;font-weight:bold;background-color:white;position:relative}.case-exemple-img{width:25px;height:25px;border:1px solid #333;vertical-align:middle;margin-left:5px}@media print{body{margin:0;padding:0}.row-label{-webkit-print-color-adjust:exact!important;color-adjust:exact!important;print-color-adjust:exact!important}}</style></head><body><div id=document-container></div><script>function getNbSerieFromURL(){const urlParams=new URLSearchParams(window.location.search);const nbSerie=parseInt(urlParams.get('nbserie'),10);if(isNaN(nbSerie)||nbSerie<=0){return 200;}
return nbSerie;}
function createPageHeader(){return`
                <div class="header">
                    <div class="bandeau">Série Kayak Cross</div>
                    <div class="poste-section">
                        <span>Entourer le poste :</span>
                        <span class="circle-option">Départ</span>
                        <span class="circle-option">Roll</span>
                        <span class="circle-option">Arrivée</span>
                        <span class="porte-input">Porte n° <input type="text"></span>
                    </div>
                </div>`;}
function createHelpSection(){return`
                <div class="aide-remplissage">
                    <div class="aide-title">Aide au remplissage :</div>
                    <div class="aide-content">
                        <span class="aide-section"><strong>Arrivée </strong><span class="exemple-case">1</span> <span class="exemple-case">2</span> <span class="exemple-case">3</span> <span class="exemple-case">4</span></span>
                        <span class="aide-separator">&nbsp;</span>
                        <span class="aide-section"><strong>Autres postes </strong></span>
                        <span class="aide-item">CLEAR <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='25' height='25'><line x1='0' y1='25' x2='25' y2='0' stroke='black' stroke-width='2'/></svg>" class="case-exemple-img"></span>
                        <span class="aide-item">FAULT <span class="exemple-case">F</span></span>
                        <span class="aide-item">RAL <span class="exemple-case">R</span></span>
                    </div>
                </div>`;}
function createTableBlock(startNumber,totalSeries){const tableBlock=document.createElement('div');tableBlock.className='bloc';let tableHTML=`
                <table>
                    <thead>
                        <tr>
                            <th style="width: 35px;"></th>`;for(let i=0;i<25;i++){const currentSeriesNumber=startNumber+i;if(currentSeriesNumber<=totalSeries){tableHTML+=`<th><span class="serie-number">${currentSeriesNumber}</span></th>`;}else{tableHTML+=`<th><span class="serie-number hidden-number">${currentSeriesNumber}</span></th>`;}}
tableHTML+=`
                        </tr>
                    </thead>
                    <tbody>`;const rowLabels=[{label:'R',colorClass:'red'},{label:'V',colorClass:'green'},{label:'B',colorClass:'blue'},{label:'J',colorClass:'yellow'}];rowLabels.forEach(row=>{tableHTML+=`<tr><td class="row-label ${row.colorClass}">${row.label}</td>`;for(let i=0;i<25;i++){tableHTML+=`<td></td>`;}
tableHTML+=`</tr>`;});tableHTML+=`
                    </tbody>
                </table>`;tableBlock.innerHTML=tableHTML;return tableBlock;}
function buildDocument(){const container=document.getElementById('document-container');const totalSeries=getNbSerieFromURL();const SERIES_PER_BLOCK=25;const BLOCKS_PER_PAGE=2;const SERIES_PER_PAGE=SERIES_PER_BLOCK*BLOCKS_PER_PAGE;const totalBlocks=Math.ceil(totalSeries/SERIES_PER_BLOCK);const totalPages=Math.ceil(totalBlocks/BLOCKS_PER_PAGE);for(let i=0;i<totalPages;i++){const page=document.createElement('div');page.className='page';page.innerHTML+=createPageHeader();const startSeriesForPage=i*SERIES_PER_PAGE+1;for(let j=0;j<BLOCKS_PER_PAGE;j++){const startSeriesForBlock=startSeriesForPage+(j*SERIES_PER_BLOCK);if(startSeriesForBlock<=totalSeries){page.appendChild(createTableBlock(startSeriesForBlock,totalSeries));}}
page.innerHTML+=createHelpSection();container.appendChild(page);}}
document.addEventListener('DOMContentLoaded',()=>{buildDocument();setTimeout(()=>{window.print();},100);});</script></body></html>
