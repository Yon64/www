<!DOCTYPE html><html lang=fr><head><meta charset=UTF-8><meta name=viewport content="width=device-width, initial-scale=1.0"><title>Résultats de la Compétition Time Trial</title><link rel=icon type=image/png sizes=64x64 href=./favicons/favicon-64x64.png><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px;color:#333}.container{max-width:1400px;margin:0 auto;background:rgba(255,255,255,0.95);border-radius:20px;box-shadow:0 20px 40px rgba(0,0,0,0.1);overflow:hidden}.header{background:linear-gradient(135deg,#2c3e50 0%,#34495e 100%);color:white;padding:40px}.header h1{font-size:2.2rem;margin-bottom:15px;font-weight:300}.competition-info{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;margin-top:20px}.info-item{display:flex;align-items:center;gap:10px;font-size:1.1rem}.info-icon{width:30px;height:30px;background:rgba(255,255,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px}.btn-back{display:inline-flex;align-items:center;gap:10px;background:rgba(255,255,255,0.2);color:white;text-decoration:none;padding:12px 20px;border-radius:25px;transition:all 0.3s ease;margin-bottom:20px}.btn-back:hover{background:rgba(255,255,255,0.3);transform:translateX(-5px)}.content{padding:40px}.category-section{margin-bottom:50px;background:white;border-radius:15px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,0.08)}.category-header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;padding:25px;font-size:1.4rem;font-weight:600;display:flex;align-items:center;gap:15px}.category-icon{width:40px;height:40px;background:rgba(255,255,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px}.results-table{width:100%;border-collapse:collapse;font-size:0.95rem}.results-table th{background:#f8f9fa;padding:15px;text-align:left;font-weight:600;color:#2c3e50;border-bottom:2px solid #e9ecef}.results-table td{padding:15px;border-bottom:1px solid #e9ecef;vertical-align:middle}.results-table tbody tr:hover{background:#f8f9fa}.rank-cell{text-align:center;font-weight:700;color:#2c3e50;font-size:1.1rem}.rank-medal{display:inline-flex;align-items:center;justify-content:center;width:35px;height:35px;border-radius:50%;color:white;font-weight:bold}.rank-1{background:linear-gradient(135deg,#f1c40f,#f39c12)}.rank-2{background:linear-gradient(135deg,#95a5a6,#7f8c8d)}.rank-3{background:linear-gradient(135deg,#e67e22,#d35400)}.dossard{background:linear-gradient(135deg,#3498db,#2980b9);color:white;padding:5px 10px;border-radius:15px;font-weight:600;display:inline-block;min-width:40px;text-align:center}.equipier-name{font-weight:600;color:#2c3e50;line-height:1.4}.club{color:#666;font-style:italic}.message-area{text-align:center;padding:60px 20px;color:#666}.message-area h3{font-size:1.5rem;margin-bottom:10px;color:#2c3e50}.temps{font-family:'Courier New',monospace;font-weight:600;color:#2c3e50;text-align:center}.loading{text-align:center;padding:50px;font-size:1.2em}.missing-ranking-alert{background-color:#d32f2f;color:white;padding:20px 30px;margin-bottom:5px;border-radius:15px 15px 0 0;display:flex;align-items:center;gap:20px;box-shadow:0 4px 15px rgba(0,0,0,0.2);border-bottom:4px solid #b71c1c}.missing-ranking-alert .alert-icon{font-size:2.5rem}.missing-ranking-alert .alert-text{flex:1}.missing-ranking-alert .alert-title{font-size:1.2rem;display:block;margin-bottom:5px;text-transform:uppercase}@media (max-width:768px){.header{padding:20px}.header h1{font-size:1.8rem}.content{padding:20px}.results-table{font-size:0.85rem}.results-table th,.results-table td{padding:10px 8px}.competition-info{grid-template-columns:1fr}}</style></head><body><div class=container><div class=header id=competitionHeader></div><div class=content id=resultsContent><div class=loading>Chargement des résultats...</div></div></div><script type=module>import{loadLanguage}from'./js/languageManager.js';import{applyStaticTexts,escapeHtml}from'./js/utils.js';document.addEventListener('DOMContentLoaded',async function(){await loadLanguage(['common','gestionnaire']);applyStaticTexts(window.APP_TEXTS,document.body);const competitionHeader=document.getElementById('competitionHeader');const resultsContent=document.getElementById('resultsContent');function escapeHtml(unsafe){if(unsafe===null||typeof unsafe==='undefined')return'';return String(unsafe).replace(/&/g,"&").replace(/</g,"<").replace(/>/g,">").replace(/"/g,"\"").replace(/'/g,"'");}
function convertirTemps(tps_chrono_value){if(tps_chrono_value===null||typeof tps_chrono_value==='undefined'){return'-';}
if(typeof tps_chrono_value==='string'){return tps_chrono_value;}
if(typeof tps_chrono_value==='number'){const val=tps_chrono_value;if(val<=0){return'-';}
const secondes_totales=val/1000.0;const minutes=Math.floor(secondes_totales/60);const secondes_part=secondes_totales%60;if(minutes>0){return`${minutes}:${secondes_part.toFixed(2).padStart(5, '0')}`;}else{return`${secondes_part.toFixed(2)}`;}}
return'-';}
const urlParams=new URLSearchParams(window.location.search);const codeCompetition=urlParams.get('competition');const source=urlParams.get('source')||'competffck';if(!codeCompetition){resultsContent.innerHTML='<div class="message-area">'+'<h3>Erreur</h3>'+'<p>Aucun code de compétition n\'a été fourni dans l\'URL (ex: ?competition=123).</p></div>';competitionHeader.innerHTML=``;return;}
const apiUrl=`api/api_competffck_resultats.php?competition=${codeCompetition}&source=${source}`;fetch(apiUrl).then(response=>{if(!response.ok){throw new Error(`Erreur HTTP: ${response.status}`);}
return response.json();}).then(apiResponse=>{if(!apiResponse.success||!apiResponse.data){resultsContent.innerHTML=`
                            <div class="message-area">
                                <h3>Erreur</h3>
                                <p>${escapeHtml(apiResponse.message || "Impossible de récupérer les données.")}</p>
                            </div>`;document.title=`Erreur - Compétition`;competitionHeader.innerHTML=`<h1>Erreur de chargement</h1>`;return;}
const{competition_details,statuts_categories,resultats_par_categorie}=apiResponse.data;document.title=`Résultats - ${escapeHtml(competition_details.Nom)}`;const dateDebut=new Date(competition_details.Date_debut).toLocaleDateString('fr-FR');const dateFin=new Date(competition_details.Date_fin).toLocaleDateString('fr-FR');const dateDisplay=dateDebut===dateFin?dateDebut:`${dateDebut} - ${dateFin}`;competitionHeader.innerHTML=`
                        <h1>🏆 ${escapeHtml(competition_details.Nom)}</h1>
                        <div class="competition-info">
                            <div class="info-item">
                                <div class="info-icon">📍</div>
                                <span>${escapeHtml(competition_details.Ville)}</span>
                            </div>
                            <div class="info-item">
                                <div class="info-icon">📅</div>
                                <span>${escapeHtml(dateDisplay)}</span>
                            </div>
                        </div>
                    `;let categories_display_data={};for(const code_cat in resultats_par_categorie){if(resultats_par_categorie.hasOwnProperty(code_cat)){const statut_info=statuts_categories[code_cat]||{Statut_epreuve:0,nombre_classes:0};const statut_epreuve=statut_info.Statut_epreuve;const nombre_classes_cat=statut_info.nombre_classes;const bateaux_api=resultats_par_categorie[code_cat];if(statut_epreuve>=1){let processed_bateaux=bateaux_api.map(bateau_api=>({...bateau_api,classement:bateau_api.calculated_rang,temps_chrono_formate:convertirTemps(bateau_api.Tps_chrono)}));categories_display_data[code_cat]={nom:code_cat,statut:statut_epreuve,bateaux:processed_bateaux,nombre_classes:nombre_classes_cat};}}}
const sortedCategoryNames=Object.keys(categories_display_data).sort((a,b)=>a.localeCompare(b));resultsContent.innerHTML='';if(sortedCategoryNames.length===0){resultsContent.innerHTML=`
                            <div class="message-area">
                                <h3>Aucun résultat disponible</h3>
                                <p>Les résultats pour les catégories dont le programme est suffisamment avancé ne sont pas encore disponibles ou aucune catégorie ne remplit ce critère (statut >= 4).</p>
                            </div>`;return;}
sortedCategoryNames.forEach((categorie_nom_key,index)=>{const categorie_data=categories_display_data[categorie_nom_key];const participants=categorie_data.bateaux;const aDesTemps=participants.some(p=>typeof p.Tps_chrono==='number'&&p.Tps_chrono>0);const aDesCltc=participants.some(p=>p.Cltc&&p.Cltc>0);const isCltcMissing=aDesTemps&&!aDesCltc;const section=document.createElement('div');section.className='category-section';section.style.opacity='0';section.style.transform='translateY(30px)';const warningTitle=window.APP_TEXTS.config?.warningNoCltcW||"Attention : Classement non officiel";const warningSub=window.APP_TEXTS.config?.warningNoCltc||"Catégorie en attente de validation";let alertHtml='';if(isCltcMissing){alertHtml=`
                                <div class="missing-ranking-alert">
                                    <span class="alert-icon">⚠️</span>
                                    <div class="alert-text">
                                        <span class="alert-title">${warningTitle}</span>
                                        ${warningSub}
                                    </div>
                                </div>`;}
let tableRowsHtml='';categorie_data.bateaux.forEach(bateau=>{tableRowsHtml+=`
                                <tr>
                                    <td class="rank-cell">
                                        ${bateau.classement !== null && bateau.classement <= 3 && bateau.classement > 0 ? 
                                            `<div class="rank-medal rank-${bateau.classement}">${bateau.classement}</div>` : 
                                            (bateau.classement !== null && bateau.classement > 0 ? bateau.classement : '-')}
                                    </td>
                                    <td>
                                        <span class="dossard">${escapeHtml(bateau.Dossard) || '-'}</span>
                                    </td>
                                    <td class="equipier-name">${escapeHtml(bateau.Nom) || 'N/A'}</td>
                                    <td class="equipier-name">${escapeHtml(bateau.Prenom) || ''}</td>
                                    <td class="club">${escapeHtml(bateau.Club) || 'Non renseigné'}</td>
                                    <td class="temps">${escapeHtml(bateau.temps_chrono_formate)}</td>
                                </tr>`;});const totalParticipants=categorie_data.bateaux.length;const nombreClasses=categorie_data.nombre_classes;let participantsInfo=`${totalParticipants} participant${totalParticipants > 1 ? 's' : ''}`;if(typeof nombreClasses==='number'){participantsInfo+=`, ${nombreClasses} classé${nombreClasses > 1 ? 's' : ''}`;}
section.innerHTML=`
                            ${alertHtml}
                            <div class="category-header">
                                <div class="category-icon">🚣</div>
                                <span>${escapeHtml(categorie_data.nom)}</span>
                                <span style="margin-left: auto; font-size: 0.9rem; opacity: 0.8;">
                                    (${participantsInfo})
                                </span>
                            </div>
                            <table class="results-table">
                                <thead>
                                    <tr>
                                        <th>${window.APP_TEXTS.headerRank}</th>
                                        <th>${window.APP_TEXTS.headerBibBref}</th>
                                        <th>${window.APP_TEXTS.headerName}</th>
                                        <th>${window.APP_TEXTS.headerFirstName}</th>
                                        <th>${window.APP_TEXTS.headerClub}</th>
                                        <th>${window.APP_TEXTS.headerTime || 'Temps'}</th>                                        
                                    </tr>
                                </thead>
                                <tbody>
                                    ${tableRowsHtml}
                                </tbody>
                            </table>
                        `;resultsContent.appendChild(section);setTimeout(()=>{section.style.transition='all 0.6s ease';section.style.opacity='1';section.style.transform='translateY(0)';},index*100);});}).catch(error=>{console.error('Erreur lors de la récupération des données:',error);resultsContent.innerHTML=`
                        <div class="message-area">
                            <h3>Erreur de Communication</h3>
                            <p>Impossible de contacter le serveur pour récupérer les résultats. Veuillez vérifier votre connexion ou réessayer plus tard.</p>
                            <p><small>Détail: ${escapeHtml(error.message)}</small></p>
                        </div>`;document.title=`Erreur - Compétition`;competitionHeader.innerHTML=`<h1>Erreur de chargement</h1>`;});});</script></body></html>
