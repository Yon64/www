<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<title>TV Data Course</title>

	<link rel="shortcut icon" href="./16x16_ffck.png" />
	<link rel="icon" href="./16x16_ffck.png"/>
	
	<link href="./css/data_course.css" rel="stylesheet">
</head>
<body> 
	<div id ="head">
		<div class='label_title'>Course Data</div>
		<div class='label_length'>Length</div>
		<div class='label_gates'>Gates</div>
		<div class='label_upstream'>Upstream</div>

		<div class='length'>210m</div>
		<div class='gates'>23</div>
		<div class='upstream'>2</div>
		<div class ='picture'></div>

	</div>

	
	
	<script src="../bootstrap-5.0.1/js/bootstrap.min.js"></script>
	<script src="../adv/ws.js"></script>
	<script src="../adv/adv.js"></script>
	<script src="../adv/canoe.js"></script>
	
	<script src="../adv/ws_params.js"></script>
  <script src="js/offline_socket.js"></script>
	<script>
		const socket = io();

		socket.on('update_course_data', (data) => {
			if (data.length) document.querySelector('.length').textContent = data.length;
			if (data.gates) document.querySelector('.gates').textContent = data.gates;
			if (data.upstream) document.querySelector('.upstream').textContent = data.upstream;

			if (data.image) {
				document.querySelector('.picture').innerHTML = `
					<img src="${data.image}" alt="Course" style="max-width: 100%; max-height: 300px;">
				`;
			} else {
				document.querySelector('.picture').innerHTML = '';
			}
		});
	</script>
	
	<script>document.addEventListener('DOMContentLoaded', function() {Init();})</script>
</body>
</html>
