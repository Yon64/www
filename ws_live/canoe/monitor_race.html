<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Résultats Course</title>
    <link rel="shortcut icon" href="./16x16_ffck.png" />
    <link rel="icon" href="./16x16_ffck.png" />
    <link href="../bootstrap-5.0.1/css/bootstrap.min.css" rel="stylesheet" />

  </head>
  <body>
    <div id="parametre" title="Paramètres" onclick="OpenParametrage()">
      <button class="btn_param"><img src="./img/parametres.png" /></button>
    </div>
    <button
      id="fullscreen"
      class="btn btn-danger"
      title="Basculer en mode plein écran"
      onclick="FullScreen(this)"
    >
      Plein écran
    </button>
    <div id="reel">
      <iframe
        id="topFrameLeft"
        class="topFrameLeft"
        src=""
        scrolling="yes"
        name="Left"
      ></iframe
      ><iframe
        id="topFrameRight"
        class="topFrameRight"
        src=""
        scrolling="yes"
        name="Right"
      ></iframe
      ><iframe
        id="bottomFrame"
        class="bottomFrame"
        src=""
        scrolling="yes"
        name="Bottom"
      ></iframe>
    </div>
    <div id="demo">
      <iframe
        id="topFrameLeft_demo"
        class="topFrameLeft"
        src=""
        scrolling="yes"
      ></iframe
      ><iframe
        id="topFrameRight_demo"
        class="topFrameRight"
        src=""
        scrolling="yes"
      ></iframe
      ><iframe
        id="bottomFrame_demo"
        class="bottomFrame"
        src=""
        scrolling="yes"
      ></iframe>
    </div>
    <div id="message">
      <div
        id="message_provisoire"
        class="container-fluid d-flex align-items-center bg-dark"
        style="position: absolute; bottom: 0; width: 100%"
      >
        <div class="navbar-text mx-auto">
          <h4 class="text-danger fw-bold display-6 text-nowrap">
            <span id="titre"
              >Résultats provisoires en attente de vérifications</span
            >
          </h4>
        </div>
      </div>
    </div>
    <div id="info" onclick='this.style.display="none"'>
      Paramétrage de l'affichage
    </div>
    <div id="parametrages">
      <h4>Paramètres d'affichage</h4>
      <div class="cadre">
        <div class="rounded-pill cadre_info">
          <div class="fw-bold text-center">
            Appuyer sur F11 pour mettre en plein écran
          </div>
          <div class="text-center">
            régler le nb de portes (en bas), prérégler, puis ajuster si besoin.
          </div>
        </div>
        <div class="row align-items-center">
          <div class="col-auto">
            <div class="form-label d-flex align-items-center">
              <label for="zoom" class="m-0">Zoom</label>
            </div>
          </div>
          <div class="col px-0">
            <input
              type="range"
              class="form-range"
              min="20"
              max="200"
              step="2"
              id="zoom"
              onchange="Zoom()"
            />
          </div>
          <div class="col-auto form-label"><span id="text_zoom"></span>%</div>
        </div>
        <hr class="m-0 p-0" />
        <div class="fw-bold fst-italic">
          Choisir le dernier numero du classement visible :
        </div>
        <div class="row align-items-center">
          <div class="col-auto">
            <div class="form-label d-flex align-items-center">
              <label for="nb_lg_finish" class="d-block m-0"
                >Nbre de lignes derniers arrivés</label
              >
            </div>
          </div>
          <div class="col px-0">
            <input
              type="range"
              class="form-range"
              min="3"
              max="60"
              id="nb_lg_finish"
              onchange="valeurs.scrolling=this.value,ChangeText(frame_demo)"
            />
          </div>
          <div class="col-auto form-label">
            <span id="text_nb_lg_finish" class="form-label"></span>
          </div>
        </div>
        <div class="row align-items-center">
          <div class="col-auto">
            <div class="form-label d-flex align-items-center">
              <label for="largeur" class="m-0">Lg Zone Gauche</label>
            </div>
          </div>
          <div class="col px-0">
            <input
              type="range"
              class="form-range"
              min="0"
              max="100"
              step="0.2"
              id="largeur"
              onchange="RedimensionnerLargeur(frame_demo)"
            />
          </div>
          <div class="col-auto form-label">
            <span id="text_largeur"></span>%
          </div>
        </div>
        <hr class="m-0 p-0" />
        <div class="row align-items-center">
          <div class="col-auto">
            <div class="form-label d-flex align-items-center">
              <label for="delay" class="m-0">Temps affichage classement</label>
            </div>
          </div>
          <div class="col px-0">
            <input
              type="range"
              class="form-range"
              min="5"
              max="60"
              id="delay"
              onchange="valeurs.delay=this.value,ChangeText(frame_demo)"
            />
          </div>
          <div class="col-auto form-label">
            <span id="text_delay" class="small"></span>sec
          </div>
        </div>
        <hr class="m-0 p-0" />
        <div class="row align-items-center">
          <div class="col-8">
            <div class="form-check form-switch">
              <input
                class="form-check-input"
                type="checkbox"
                role="switch"
                id="switch_scroll"
                onchange='valeurs.Vscroll=this.checked?"yes":"no",ChangeScroll(frame_demo)'
              /><label class="form-check-label" for="switch_scroll"
                >Afficher barre de scroll</label
              >
            </div>
            <div class="form-check form-switch">
              <input
                class="form-check-input"
                type="checkbox"
                role="switch"
                id="switch_titre"
                onchange="ChangeTitre(this)"
              /><label class="form-check-label" for="switch_titre"
                >Afficher le bandeau titre de la course</label
              >
            </div>
            <div class="form-check form-switch">
              <input
                class="form-check-input"
                type="checkbox"
                role="switch"
                id="switch_mode"
                onchange="ChangeMode(this)"
              /><label class="form-check-label" for="switch_mode"
                >Mode 2 colonnes derniers arrivés</label
              >
            </div>
            <div class="form-check form-switch">
              <input
                class="form-check-input"
                type="checkbox"
                role="switch"
                id="switch_bandeau"
                onchange="ChangeBandeau(this)"
              /><label class="form-check-label" for="switch_bandeau"
                >Afficher bandeau Résultats provisoires</label
              >
            </div>
          </div>
          <div class="col-4 align-self-end pb-1">
            <button class="btn btn-primary float-end" onclick="Preregler()">
              Prérégler
            </button>
          </div>
        </div>
        <hr class="m-0 p-0" />
        <hr class="m-0 p-0" />
        <div class="row align-items-center">
          <div class="col-auto">
            <div class="form-label d-flex align-items-center">
              <label for="nb_porte" class="m-0"
                >Nb de Portes réglage démo</label
              >
            </div>
          </div>
          <div class="col px-0">
            <input
              type="range"
              class="form-range"
              min="0"
              max="25"
              step="1"
              id="nb_porte"
              onchange="ChangeNbPorte(this)"
            />
          </div>
          <div class="col-auto form-label">
            <span id="text_nb_porte"></span>
          </div>
        </div>
      </div>
      <div id="boutons_validation">
        <div class="row">
          <div class="col-sm-4">
            <button type="button" class="btn btn-warning" onclick="Defaut()">
              Réinitialiser
            </button>
          </div>
          <div class="col-sm-8 text-right">
            <button type="button" class="btn btn-danger" onclick="Annuler()">
              Annuler</button
            ><button type="button" class="btn btn-success" onclick="Valider()">
              Valider
            </button>
          </div>
        </div>
      </div>
    </div>

  </body>
</html>
