<!DOCTYPE html>
<html>
<head>
  <title>Affichage</title>
  <style>
    body {
      margin: 0;
      background: transparent;
      overflow: hidden;
    }
    .haut {
      width: 2000px;
      height: 1200px;
      border: none;
      background: transparent;
      opacity: 1;
      transform: translateY(-2500px); 
      transition: transform 2s ease;
      pointer-events: none;
      position: absolute;
      top: 0;
      left: 0;
    }

    .bas {
      width: 2000px;
      height: 1200px;
      border: none;
      background: transparent;
      opacity: 1;
      transform: translateY(3500px); 
      transition: transform 2s ease;
      pointer-events: none;
      position: absolute;
      top: 0;
      left: 0;
    }

    .inrace {
      width: 2000px;
      height: 1200px;
      border: none;
      background: transparent;
      opacity: 1;
      transform: translateY(3500px); 
      transition: transform 1s ease;
      pointer-events: none;
      position: absolute;
      top: 0;
      left: 0;
    }

    .droite {
      width: 2000px;
      height: 1200px;
      border: none;
      background: transparent;
      opacity: 1;
      transform: translateX(4000px); 
      transition: transform 2s ease;
      pointer-events: none;
      position: absolute;
      top: 0;
      left: 0;
    }

    iframe.visible {
      opacity: 1;
      transform: translateY(0); 
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <iframe id="tv_startlist" class="haut" src="tv_startlist.html" allowtransparency="true"></iframe>
  <iframe id="tv_ranking" class="haut" src="tv_ranking.html" allowtransparency="true"></iframe>
  <iframe id="weather" class="haut" src="weather.html" allowtransparency="true"></iframe>
  <iframe id="cross_rank" class="droite" src="cross_rank.html" allowtransparency="true"></iframe>
  <iframe id="cross_start" class="bas" src="cross_start.html" allowtransparency="true"></iframe>
  <iframe id="data_course" class="haut" src="data_course.html" allowtransparency="true"></iframe>
  <iframe id="indiv" class="bas" src="indiv.html" allowtransparency="true"></iframe>
  <iframe id="rank_inrace" class="haut" src="rank_inrace.html" allowtransparency="true"></iframe>
  <iframe id="time_table" class="haut" src="time_table.html" allowtransparency="true"></iframe>
  <iframe id="title" class="haut" src="title.html" allowtransparency="true"></iframe>

  <script src="js/offline_socket.js"></script>
  <script>
    const socket = io();
    const iframes = {};
    const allGraphics = ['tv_startlist', 'tv_ranking', 'weather', 'cross_rank', 'cross_start', 'data_course', 'indiv', 'rank_inrace', 'time_table', 'title'];

    allGraphics.forEach(id => {
      const el = document.getElementById(id);
      if (el) iframes[id] = el;
    });

    socket.on('show_graphic', (payload) => {
      const type = typeof payload === 'string' ? payload : payload.type;
      const url = typeof payload === 'object' && payload.url ? payload.url : `${type}.html`;

      for (const id in iframes) {
        if (id === type) {
          iframes[id].src = url;
          iframes[id].classList.add('visible');
        } else {
          iframes[id].classList.remove('visible');
        }
      }
    });

    socket.on('hide_graphic', (type) => {
      if (iframes[type]) {
        iframes[type].classList.remove('visible');
      }
    });
  </script>
</body>
</html>
